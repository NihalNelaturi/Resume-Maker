server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # ES module files (.mjs) — e.g. the PDF.js worker. nginx's default mime.types
  # doesn't map .mjs, so without this it is served as application/octet-stream
  # and the browser refuses to run it as a module worker (breaking PDF import).
  location ~* \.mjs$ {
    default_type text/javascript;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}

